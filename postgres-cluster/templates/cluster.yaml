apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.postgres.name }}
  namespace: {{ .Values.postgres.namespace }}
spec:
  instances: {{ .Values.postgres.instances }}

  resources:
    {{- toYaml .Values.postgres.resources | nindent 4 }}

  postgresql:
    parameters:
      {{- toYaml .Values.postgres.postgresql.parameters | nindent 6 }}

  storage:
    size: {{ .Values.postgres.storageSize | quote }}
    storageClass: {{ .Values.postgres.storageClass | quote }}

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: postgres-backup-store
