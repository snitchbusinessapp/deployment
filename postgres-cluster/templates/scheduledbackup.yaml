apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres-daily-backup
  namespace: {{ .Values.postgres.namespace }}
spec:
  schedule: "0 0 0 * * *"
  backupOwnerReference: self
  cluster:
    name: {{ .Values.postgres.name }}
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io